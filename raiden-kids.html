<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太空保衛戰 🚀</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000010;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  min-height:100vh;
  font-family:'Segoe UI',sans-serif;
  overflow:hidden; user-select:none;
}
#gameWrapper { position:relative; display:inline-block; }
canvas {
  display:block;
  border:2px solid rgba(100,200,255,0.3);
  border-radius:8px;
  box-shadow:0 0 40px rgba(0,150,255,0.4);
}
#ui {
  position:absolute; top:0; left:0; right:0;
  display:flex; justify-content:space-between; align-items:flex-start;
  padding:8px 12px; pointer-events:none;
}
.ui-block { color:#fff; text-shadow:0 0 8px #0af; }
.label { font-size:10px; opacity:0.7; letter-spacing:1px; text-transform:uppercase; }
.value { font-size:20px; font-weight:900; line-height:1; }
#levelDisp { font-size:13px; font-weight:900; color:#ffe; text-shadow:0 0 10px #ff0; }
#hearts { font-size:18px; line-height:1.4; }
#overlay, #levelClearOverlay {
  position:absolute; inset:0;
  background:rgba(0,0,10,0.88);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  border-radius:6px; color:#fff; text-align:center; padding:20px;
}
#levelClearOverlay { display:none; }
#overlay h1 { font-size:36px; margin-bottom:8px; text-shadow:0 0 20px #0af; }
#overlay p  { font-size:14px; color:#adf; margin-bottom:22px; line-height:1.8; }
.bigBtn {
  background:linear-gradient(135deg,#0af,#06f);
  border:none; border-radius:50px;
  padding:13px 38px; font-size:19px; font-weight:900;
  color:#fff; cursor:pointer;
  box-shadow:0 0 22px #0af8;
  transition:transform .15s,box-shadow .15s;
  margin-top:8px;
}
.bigBtn:hover { transform:scale(1.06); box-shadow:0 0 34px #0aff; }
#pauseBtn {
  position:absolute; top:8px; left:50%; transform:translateX(-50%);
  background:rgba(0,170,255,0.18); border:1.5px solid rgba(0,200,255,0.45);
  border-radius:50px; color:#fff; font-size:12px; font-weight:700;
  padding:4px 14px; cursor:pointer; letter-spacing:1px;
  text-shadow:0 0 8px #0af; z-index:10; display:none;
  transition:background .15s;
}
#pauseBtn:hover { background:rgba(0,170,255,0.35); }
#homeBtn {
  position:absolute; top:8px; right:8px;
  background:rgba(255,80,80,0.18); border:1.5px solid rgba(255,120,120,0.45);
  border-radius:50px; color:#fff; font-size:12px; font-weight:700;
  padding:4px 12px; cursor:pointer;
  text-shadow:0 0 8px #f88; z-index:10; display:none;
  transition:background .15s;
}
#homeBtn:hover { background:rgba(255,80,80,0.4); }
#pauseOverlay {
  position:absolute; inset:0;
  background:rgba(0,0,20,0.82);
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  border-radius:6px; color:#fff; text-align:center;
  backdrop-filter:blur(3px);
}
#pauseOverlay h2 { font-size:34px; margin-bottom:10px; text-shadow:0 0 20px #0af; }
#pauseOverlay p  { font-size:13px; color:#adf; margin-bottom:26px; }
#mobileControls {
  display:none; position:absolute;
  bottom:38px; left:0; right:0;
  justify-content:space-between; align-items:flex-end;
  padding:0 10px; pointer-events:none;
}
.dpad { display:grid; grid-template-columns:repeat(3,44px); grid-template-rows:repeat(2,44px); gap:4px; pointer-events:all; }
.dpad button { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); border-radius:8px; color:#fff; font-size:18px; cursor:pointer; touch-action:none; }
.dpad button:active { background:rgba(0,170,255,0.4); }
.dpad .empty { background:none; border:none; pointer-events:none; }
#fireBtn { width:68px; height:68px; border-radius:50%; background:rgba(255,80,80,0.5); border:2px solid rgba(255,120,120,0.7); color:#fff; font-size:26px; cursor:pointer; pointer-events:all; touch-action:none; }
#fireBtn:active { background:rgba(255,80,80,0.85); }
@media (max-width:520px) { #mobileControls { display:flex; } }
</style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="c"></canvas>
  <div id="ui">
    <div class="ui-block">
      <div class="label">分數</div>
      <div class="value" id="scoreDisp">0</div>
    </div>
    <div class="ui-block" style="text-align:center">
      <div id="levelDisp">第 1 關</div>
      <div id="killsDisp" style="font-size:10px;color:#adf;margin-top:2px"></div>
    </div>
    <div class="ui-block" style="text-align:right">
      <div class="label">生命</div>
      <div id="hearts">❤️❤️❤️</div>
    </div>
  </div>
  <button id="pauseBtn">⏸ 暫停</button>
  <button id="homeBtn">🏠 主選單</button>
  <div id="pauseOverlay">
    <h2>⏸ 暫停中</h2>
    <p>按 P 鍵 或 ESC 繼續</p>
    <button class="bigBtn" id="resumeBtn">▶ 繼續遊戲</button>
  </div>
  <div id="levelClearOverlay"></div>
  <div id="overlay">
    <h1>🚀 太空保衛戰</h1>
    <p id="overlayDesc">⬆️⬇️⬅️➡️ 移動飛機<br>空白鍵 / Z 鍵發射子彈<br>消滅所有敵人即可過關！<br><br>共 <b style="color:#ff4">100 關</b>，難度越來越高！</p>
    <button class="bigBtn" id="startBtn">▶ 繼續遊戲</button>
    <button class="bigBtn" id="restartBtn" style="background:linear-gradient(135deg,#f44,#900);display:none">↺ 從第 1 關重來</button>
    <div id="savedInfo" style="margin-top:10px;font-size:12px;color:#8df;"></div>
  </div>
  <div id="mobileControls">
    <div class="dpad">
      <div class="empty"></div><button id="btnUp">▲</button><div class="empty"></div>
      <button id="btnLeft">◀</button><button id="btnDown">▼</button><button id="btnRight">▶</button>
    </div>
    <button id="fireBtn">💥</button>
  </div>
</div>
<script>
// ── Canvas ─────────────────────────────────────────
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,SCALE=1;
function resize(){
  const mW=Math.min(window.innerWidth-8,420);
  const mH=Math.min(window.innerHeight-8,680);
  const r=Math.min(mW/420,mH/680);
  canvas.width=Math.floor(420*r); canvas.height=Math.floor(680*r);
  W=canvas.width; H=canvas.height; SCALE=r;
}
resize(); window.addEventListener('resize',resize);

// ── Audio ──────────────────────────────────────────
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(f,t,d,v=0.16,dn=0){
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=t;o.frequency.value=f;o.detune.value=dn;
    g.gain.setValueAtTime(v,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
    o.start();o.stop(AC.currentTime+d);
  }catch(e){}
}
const sfxShoot=()=>{beep(880,'square',0.07,0.11);beep(660,'square',0.05,0.07,200);};
const sfxExplode=()=>{beep(120,'sawtooth',0.25,0.22);beep(80,'sawtooth',0.2,0.18,-300);};
const sfxHit=()=>beep(200,'square',0.15,0.2,-400);
const sfxGameOver=()=>[400,300,200,100].forEach((f,i)=>setTimeout(()=>beep(f,'sawtooth',0.28,0.28),i*150));
const sfxLaser=()=>{beep(1400,'sawtooth',0.05,0.09);beep(1900,'sine',0.04,0.07);};
const sfxSpread=()=>{beep(550,'square',0.05,0.09);beep(380,'square',0.04,0.07,400);};
const sfxWeaponGet=()=>[300,500,800,1200,1600].forEach((f,i)=>setTimeout(()=>beep(f,'sine',0.1,0.2),i*45));
const sfxLevelUp=()=>[500,700,900,1100,1400].forEach((f,i)=>setTimeout(()=>beep(f,'sine',0.12,0.22),i*70));
const sfxBossDead=()=>[300,500,700,900,1200,1600].forEach((f,i)=>setTimeout(()=>beep(f,'sine',0.14,0.25),i*60));
const sfxVictory=()=>[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>beep(f,'sine',0.5,0.3),i*130));

// ── Zone themes (10 zones × 10 levels) ────────────
const ZONES=[
  {name:'太空出發',   bg:'#000018',nebula:'rgba(0,20,80,0.35)',  star:'#adf',ec:'#ff4466',boss:'👾'},
  {name:'小行星帶',   bg:'#0a0806',nebula:'rgba(80,40,10,0.35)', star:'#fc9',ec:'#ff8833',boss:'🪨'},
  {name:'星雲地帶',   bg:'#08000f',nebula:'rgba(60,0,100,0.4)',  star:'#c9f',ec:'#aa22ff',boss:'🔮'},
  {name:'冰雪星球',   bg:'#000d14',nebula:'rgba(0,80,120,0.35)', star:'#aff',ec:'#22ccff',boss:'❄️'},
  {name:'火焰星球',   bg:'#100400',nebula:'rgba(100,30,0,0.4)',  star:'#fa8',ec:'#ff6600',boss:'🔥'},
  {name:'暗黑地帶',   bg:'#000800',nebula:'rgba(0,50,20,0.35)',  star:'#afa',ec:'#00ff66',boss:'💀'},
  {name:'閃電風暴',   bg:'#0d0d00',nebula:'rgba(80,80,0,0.4)',   star:'#ff8',ec:'#ffff00',boss:'⚡'},
  {name:'蟲洞穿越',   bg:'#080010',nebula:'rgba(80,0,80,0.4)',   star:'#faf',ec:'#ff44ff',boss:'🌀'},
  {name:'地獄深淵',   bg:'#100000',nebula:'rgba(120,0,0,0.45)',  star:'#f88',ec:'#ff2200',boss:'😈'},
  {name:'終極決戰',   bg:'#0a0a00',nebula:'rgba(100,100,0,0.45)',star:'#ff4',ec:'#ffaa00',boss:'👑'},
];

// ── Level config ───────────────────────────────────
function getLevelConfig(lv){
  const zi=Math.ceil(lv/10)-1;
  const t=(lv-1)/99;
  const isBoss=(lv%10===0);
  return {
    zi, isBoss,
    zone:ZONES[zi],
    killsNeeded: isBoss?0:(4+lv+Math.floor(lv/10)*2),
    spawnRate:   Math.max(16,Math.round(75-t*55)),
    maxEnemies:  Math.min(12,3+Math.floor(lv/8)),
    enemySpeed:  (0.8+t*2.4)*SCALE,
    enemyHP:     1+Math.floor(lv/12),
    eBulletSpd:  (1.8+t*3.0)*SCALE,
    shootFreq:   Math.max(20,Math.round(100-t*70)),
    bossHP:      25+lv*5,
    bossPhases:  1+Math.floor(lv/25),
  };
}

// ── State ──────────────────────────────────────────
let state='idle',score=0,lives=3,frame=0,level=1,kills=0,paused=false;
let stars=[],bullets=[],enemies=[],eBullets=[],explosions=[],powerups=[];
let player,keys={},autoFire=false,fireTimer=0;
let bossActive=false,boss=null,spawnTimer=0,bgY=0;
let bossMsg='',bossMsgT=0,pickupMsg='',pickupColor='#fff',pickupT=0;
let levelCfg;

// ── UI refs ────────────────────────────────────────
const overlay       =document.getElementById('overlay');
const levelClearOvr =document.getElementById('levelClearOverlay');
const scoreDisp     =document.getElementById('scoreDisp');
const heartsDisp    =document.getElementById('hearts');
const levelDispEl   =document.getElementById('levelDisp');
const killsDispEl   =document.getElementById('killsDisp');
const startBtn      =document.getElementById('startBtn');
const pauseBtn      =document.getElementById('pauseBtn');
const homeBtn       =document.getElementById('homeBtn');
const pauseOvr      =document.getElementById('pauseOverlay');
const resumeBtn     =document.getElementById('resumeBtn');
const menuBtn       =document.getElementById('menuBtn');
const savedInfo     =document.getElementById('savedInfo');

// ── Saved progress ─────────────────────────────────
function getSaved(){try{return parseInt(localStorage.getItem('rk_lv'))||1;}catch(e){return 1;}}
function doSave(lv){try{localStorage.setItem('rk_lv',lv);}catch(e){}}
(function(){
  const s=getSaved();
  const restartBtn=document.getElementById('restartBtn');
  if(s>1){
    document.getElementById('startBtn').textContent=`▶ 繼續第 ${s} 關`;
    restartBtn.style.display='block';
    savedInfo.textContent=`已儲存進度：第 ${s} 關`;
  } else {
    document.getElementById('startBtn').textContent='▶ 開始遊戲！';
  }
})();

// ── Pause ──────────────────────────────────────────
function togglePause(){
  if(state!=='playing')return;
  paused=!paused;
  pauseBtn.textContent=paused?'▶ 繼續':'⏸ 暫停';
  pauseOvr.style.display=paused?'flex':'none';
}
function goHome(){
  state='idle'; paused=false;
  pauseBtn.style.display='none';
  homeBtn.style.display='none';
  pauseOvr.style.display='none';
  levelClearOvr.style.display='none';
  enemies=[];eBullets=[];bullets=[];explosions=[];powerups=[];
  bossActive=false; boss=null;
  const saved=getSaved();
  overlay.style.display='flex';
  overlay.innerHTML=`
    <h1>🚀 太空保衛戰</h1>
    <p>⬆️⬇️⬅️➡️ 移動飛機<br>空白鍵 / Z 鍵發射子彈<br>消滅所有敵人即可過關！<br><br>共 <b style="color:#ff4">100 關</b>，難度越來越高！</p>
    <button class="bigBtn" onclick="startGame()">▶ 繼續第 ${saved} 關</button>
    ${saved>1?`<button class="bigBtn" style="background:linear-gradient(135deg,#f44,#900);margin-top:8px" onclick="startGame(1)">↺ 從第 1 關重來</button>`:''}
    <div style="margin-top:10px;font-size:12px;color:#8df;">${saved>1?`已儲存進度：第 ${saved} 關`:''}</div>
  `;
}

// ── Player init ────────────────────────────────────
function initPlayer(){
  player={x:W/2,y:H*0.8,w:28*SCALE,h:36*SCALE,speed:3.5*SCALE,
    invincible:0,powerLevel:0,weaponType:'normal',weaponTimer:0};
}
function initStars(){
  stars=[];
  for(let i=0;i<130;i++)
    stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.6+0.3,s:Math.random()*1.5+0.4,b:Math.random()*0.7+0.3});
}

// ── Powerup defs ───────────────────────────────────
const PDEFS={
  power: {emoji:'🔥',bg:'#ff8800',glow:'#ffcc00',label:'火力UP'},
  rapid: {emoji:'⚡',bg:'#ffe000',glow:'#ffffff',label:'高速射擊'},
  laser: {emoji:'💎',bg:'#00eeff',glow:'#00aaff',label:'雷射穿透'},
  spread:{emoji:'🌀',bg:'#cc44ff',glow:'#ff88ff',label:'散彈攻擊'},
  life:  {emoji:'❤️',bg:'#ff5588',glow:'#ff88aa',label:'恢復生命'},
};
const PTYPES=['power','power','rapid','laser','spread','life'];
function spawnPU(x,y,force=false){
  if(!force&&Math.random()>0.4)return;
  powerups.push({x,y,vy:1.6*SCALE,type:PTYPES[Math.floor(Math.random()*PTYPES.length)],timer:0});
}

// ── Enemy spawn ────────────────────────────────────
function spawnEnemy(){
  const c=levelCfg;
  enemies.push({
    x:Math.random()*(W-40*SCALE)+20*SCALE, y:-30*SCALE,
    w:26*SCALE,h:22*SCALE,
    type:['basic','shooter','zigzag'][Math.floor(Math.random()*3)],
    hp:c.enemyHP,maxHp:c.enemyHP,
    color:c.zone.ec,
    speed:c.enemySpeed*(0.85+Math.random()*0.3),
    timer:Math.floor(Math.random()*60),
  });
}

// ── Boss spawn ─────────────────────────────────────
function spawnBoss(){
  const c=levelCfg;
  bossActive=true;
  boss={x:W/2,y:-70*SCALE,w:(60+c.zi*4)*SCALE,h:(50+c.zi*3)*SCALE,
    hp:c.bossHP,maxHp:c.bossHP,speed:(1.0+c.zi*0.15)*SCALE,
    dir:1,timer:0,phase:0,maxPhase:c.bossPhases,zi:c.zi};
}

// ── Explosions ─────────────────────────────────────
function spawnExp(x,y,big=false){
  const n=big?24:10;
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=(Math.random()*3+1)*SCALE*(big?1.8:1);
    explosions.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:Math.random()*(big?12:6)*SCALE+2,
      life:1,decay:0.025+Math.random()*0.03,
      color:big?`hsl(${Math.random()*60+10},100%,60%)`:`hsl(${Math.random()*40+20},100%,65%)`});
  }
}

// ── Draw helpers ───────────────────────────────────
function drawShip(x,y,w,h){
  ctx.save();
  ctx.shadowColor='#00aaff';ctx.shadowBlur=14;
  ctx.fillStyle='#00eeff';
  ctx.beginPath();
  ctx.moveTo(x,y-h/2);ctx.lineTo(x-w/2,y+h/2);ctx.lineTo(x-w/4,y+h/4);
  ctx.lineTo(x,y+h/6);ctx.lineTo(x+w/4,y+h/4);ctx.lineTo(x+w/2,y+h/2);
  ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(200,255,255,0.6)';
  ctx.beginPath();ctx.ellipse(x,y-h/6,w/7,h/6,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
}
function drawEnemy(e){
  ctx.save();
  ctx.shadowColor=e.color;ctx.shadowBlur=10;ctx.fillStyle=e.color;
  ctx.beginPath();ctx.ellipse(e.x,e.y,e.w/2,e.h/3,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,200,0.5)';
  ctx.beginPath();ctx.ellipse(e.x,e.y-e.h/5,e.w/4,e.h/4,0,0,Math.PI);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(e.x-e.w/7,e.y,e.w/12,0,Math.PI*2);ctx.arc(e.x+e.w/7,e.y,e.w/12,0,Math.PI*2);ctx.fill();
  if(e.maxHp>1){
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(e.x-e.w/2,e.y-e.h/2-5*SCALE,e.w,3*SCALE);
    ctx.fillStyle=`hsl(${(e.hp/e.maxHp)*110},100%,55%)`;ctx.fillRect(e.x-e.w/2,e.y-e.h/2-5*SCALE,e.w*(e.hp/e.maxHp),3*SCALE);
  }
  ctx.restore();
}
const BCOLS=['#cc1100','#aa5500','#660088','#0066aa','#cc4400','#005500','#888800','#880088','#aa0000','#aa8800'];
function drawBoss(b){
  if(!b)return;
  const bc=BCOLS[b.zi]||'#cc1100';
  ctx.save();
  ctx.shadowColor=bc;ctx.shadowBlur=28;ctx.fillStyle=bc;
  ctx.beginPath();ctx.ellipse(b.x,b.y,b.w/2,b.h/3,0,0,Math.PI*2);ctx.fill();
  const spikes=6+b.zi;
  for(let i=0;i<spikes;i++){
    const a=(i/spikes)*Math.PI*2+b.timer*0.02;
    ctx.fillStyle=bc;
    ctx.beginPath();
    ctx.moveTo(b.x+Math.cos(a)*b.w/2,b.y+Math.sin(a)*b.h/3);
    ctx.lineTo(b.x+Math.cos(a+0.2)*b.w/2.6,b.y+Math.sin(a+0.2)*b.h/3.5);
    ctx.lineTo(b.x+Math.cos(a)*(b.w/2+18*SCALE),b.y+Math.sin(a)*(b.h/3+14*SCALE));
    ctx.closePath();ctx.fill();
  }
  ctx.fillStyle='rgba(255,200,100,0.7)';ctx.beginPath();ctx.ellipse(b.x,b.y,b.w/4,b.h/4.5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(b.x-b.w/9,b.y-b.h/14,b.w/13,0,Math.PI*2);ctx.arc(b.x+b.w/9,b.y-b.h/14,b.w/13,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';ctx.beginPath();ctx.arc(b.x-b.w/9+2,b.y-b.h/14,b.w/22,0,Math.PI*2);ctx.arc(b.x+b.w/9+2,b.y-b.h/14,b.w/22,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(b.x-b.w/2,b.y-b.h/2-12*SCALE,b.w,8*SCALE);
  ctx.fillStyle=`hsl(${(b.hp/b.maxHp)*120},100%,50%)`;ctx.fillRect(b.x-b.w/2,b.y-b.h/2-12*SCALE,b.w*(b.hp/b.maxHp),8*SCALE);
  ctx.font=`${20*SCALE}px serif`;ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.fillText(levelCfg.zone.boss,b.x,b.y-b.h/2-13*SCALE);
  ctx.restore();
}
function drawPU(p){
  const d=PDEFS[p.type]||PDEFS.power;
  const pulse=Math.sin(p.timer*0.12)*0.25+0.75;
  const spin=p.timer*0.06;
  ctx.save();ctx.globalAlpha=pulse;
  ctx.shadowColor=d.glow;ctx.shadowBlur=18;ctx.strokeStyle=d.glow;ctx.lineWidth=2*SCALE;
  ctx.beginPath();ctx.arc(p.x,p.y,13*SCALE,spin,spin+Math.PI*1.4);ctx.stroke();
  ctx.beginPath();ctx.arc(p.x,p.y,13*SCALE,spin+Math.PI,spin+Math.PI*2.4);ctx.stroke();
  ctx.globalAlpha=pulse*0.9;ctx.fillStyle=d.bg;ctx.beginPath();ctx.arc(p.x,p.y,10*SCALE,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;ctx.font=`${13*SCALE}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(d.emoji,p.x,p.y);ctx.restore();
}

// ── Shooting ───────────────────────────────────────
function shoot(){
  const wt=player.weaponType,lv=player.powerLevel;
  if(wt==='laser'){
    sfxLaser();
    bullets.push({x:player.x,y:player.y-player.h/2,vy:-15*SCALE,vx:0,laser:true});
    if(lv>=2){
      bullets.push({x:player.x-14*SCALE,y:player.y-player.h/3,vy:-15*SCALE,vx:0,laser:true});
      bullets.push({x:player.x+14*SCALE,y:player.y-player.h/3,vy:-15*SCALE,vx:0,laser:true});
    }
    return;
  }
  if(wt==='spread'){
    sfxSpread();
    const cnt=4+Math.min(lv,3);
    for(let i=0;i<cnt;i++){
      const a=-Math.PI/2+(i-(cnt-1)/2)*(Math.PI/(cnt*1.6));
      bullets.push({x:player.x,y:player.y-player.h/2,vx:Math.cos(a)*8*SCALE,vy:Math.sin(a)*8*SCALE,spread:true});
    }
    return;
  }
  if(wt==='rapid'){
    sfxShoot();
    bullets.push({x:player.x-5*SCALE,y:player.y-player.h/2,vy:-12*SCALE,vx:0,rapid:true});
    bullets.push({x:player.x+5*SCALE,y:player.y-player.h/2,vy:-12*SCALE,vx:0,rapid:true});
    if(lv>=1)bullets.push({x:player.x,y:player.y-player.h/2,vy:-12*SCALE,vx:0,rapid:true});
    return;
  }
  sfxShoot();
  if(lv===0){bullets.push({x:player.x,y:player.y-player.h/2,vy:-9*SCALE,vx:0});}
  else if(lv===1){bullets.push({x:player.x-9*SCALE,y:player.y-player.h/2,vy:-9*SCALE,vx:0});bullets.push({x:player.x+9*SCALE,y:player.y-player.h/2,vy:-9*SCALE,vx:0});}
  else if(lv===2){
    bullets.push({x:player.x,y:player.y-player.h/2,vy:-9.5*SCALE,vx:0});
    bullets.push({x:player.x-13*SCALE,y:player.y-player.h/3,vy:-9*SCALE,vx:-0.4*SCALE});
    bullets.push({x:player.x+13*SCALE,y:player.y-player.h/3,vy:-9*SCALE,vx:0.4*SCALE});
  }else if(lv===3){
    for(let i=0;i<5;i++){const a=-Math.PI/2+(i-2)*(Math.PI/12);bullets.push({x:player.x,y:player.y-player.h/2,vx:Math.cos(a)*9.5*SCALE,vy:Math.sin(a)*9.5*SCALE});}
  }else{
    for(let i=0;i<7;i++){const a=-Math.PI/2+(i-3)*(Math.PI/14);bullets.push({x:player.x,y:player.y-player.h/2,vx:Math.cos(a)*10*SCALE,vy:Math.sin(a)*10*SCALE});}
  }
}
function eShoot(e){
  const dx=player.x-e.x,dy=player.y-e.y,d=Math.sqrt(dx*dx+dy*dy)||1;
  const sp=levelCfg.eBulletSpd;
  eBullets.push({x:e.x,y:e.y,vx:(dx/d)*sp,vy:(dy/d)*sp,r:4*SCALE});
}
function bShoot(b){
  const shots=3+b.phase*2+b.zi;
  for(let i=0;i<shots;i++){
    const a=(i/shots)*Math.PI*2+b.timer*0.04;
    const sp=(2.5+b.zi*0.2)*SCALE;
    eBullets.push({x:b.x,y:b.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:(5+b.zi*0.3)*SCALE,isBoss:true});
  }
}

// ── Collision ──────────────────────────────────────
function cR(cx,cy,cr,rx,ry,rw,rh){
  return (cx-Math.max(rx,Math.min(cx,rx+rw)))**2+(cy-Math.max(ry,Math.min(cy,ry+rh)))**2<cr**2;
}
function rO(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}

// ── Update ─────────────────────────────────────────
function update(){
  frame++;bgY=(bgY+SCALE)%H;
  const c=levelCfg;
  stars.forEach(s=>{s.y+=s.s*SCALE;if(s.y>H){s.y=0;s.x=Math.random()*W;}});

  // player move
  const sp=player.speed;
  if(keys['ArrowLeft']||keys['a']||keys['ml'])  player.x=Math.max(player.w/2,player.x-sp);
  if(keys['ArrowRight']||keys['d']||keys['mr']) player.x=Math.min(W-player.w/2,player.x+sp);
  if(keys['ArrowUp']||keys['w']||keys['mu'])    player.y=Math.max(player.h/2,player.y-sp);
  if(keys['ArrowDown']||keys['s']||keys['md'])  player.y=Math.min(H-player.h/2,player.y+sp);
  if(player.invincible>0)player.invincible--;

  // weapon timer
  if(player.weaponType!=='normal'&&player.weaponTimer>0){
    player.weaponTimer--;
    if(player.weaponTimer<=0)player.weaponType='normal';
  }

  // fire
  fireTimer++;
  const fr={normal:player.powerLevel>0?10:14,rapid:5,laser:18,spread:20}[player.weaponType]||14;
  if(fireTimer>=fr&&(keys[' ']||keys['z']||autoFire)){shoot();fireTimer=0;}

  bullets=bullets.filter(b=>{b.x+=b.vx;b.y+=b.vy;return b.y>-20;});

  eBullets=eBullets.filter(b=>{
    b.x+=b.vx;b.y+=b.vy;
    if(b.x<0||b.x>W||b.y<0||b.y>H)return false;
    if(player.invincible===0&&cR(b.x,b.y,b.r,player.x-player.w/2,player.y-player.h/2,player.w,player.h)){hitPlayer();return false;}
    return true;
  });

  // spawn
  if(!bossActive||boss){
    spawnTimer++;
    if(spawnTimer>=c.spawnRate&&enemies.length<c.maxEnemies){spawnEnemy();spawnTimer=0;}
  }
  if(bossActive&&!boss&&enemies.length===0){spawnBoss();}

  // enemies
  enemies=enemies.filter(e=>{
    e.timer++;e.y+=e.speed;
    if(e.type==='zigzag')e.x+=Math.sin(e.timer*0.08)*1.8*SCALE;
    if(e.type==='shooter'&&e.timer%c.shootFreq===0)eShoot(e);
    if(player.invincible===0&&rO(e.x-e.w/2,e.y-e.h/2,e.w,e.h,player.x-player.w/2,player.y-player.h/2,player.w,player.h)){
      spawnExp(e.x,e.y);hitPlayer();return false;
    }
    if(e.y>H+30*SCALE)return false;
    let hit=false;
    bullets=bullets.filter(b=>{
      if(!hit&&cR(b.x,b.y,5*SCALE,e.x-e.w/2,e.y-e.h/2,e.w,e.h)){
        e.hp--;
        if(e.hp<=0){
          score+=10*(e.maxHp+c.zi);kills++;
          spawnExp(e.x,e.y);sfxExplode();spawnPU(e.x,e.y);
          hit=true;
          if(!c.isBoss&&kills>=c.killsNeeded)levelClear();
        }
        return b.laser?true:false;
      }
      return true;
    });
    return !hit||e.hp>0;
  });

  // boss
  if(bossActive&&boss){
    boss.timer++;boss.x+=boss.speed*boss.dir;
    if(boss.x>W-boss.w/2||boss.x<boss.w/2)boss.dir*=-1;
    if(boss.y<H*0.18)boss.y+=1.8*SCALE;
    const si=Math.max(18,50-boss.zi*3-boss.phase*4);
    if(boss.timer%si===0)bShoot(boss);
    if(boss.timer%350===0)boss.phase=Math.min(boss.maxPhase,boss.phase+1);
    bullets=bullets.filter(b=>{
      if(cR(b.x,b.y,5*SCALE,boss.x-boss.w/2,boss.y-boss.h/2,boss.w,boss.h)){
        boss.hp--;
        if(boss.hp<=0){
          score+=500+level*20;
          spawnExp(boss.x,boss.y,true);spawnExp(boss.x-30*SCALE,boss.y+10*SCALE,true);spawnExp(boss.x+30*SCALE,boss.y-10*SCALE,true);
          sfxBossDead();bossActive=false;boss=null;
          spawnPU(W/2,H*0.4,true);levelClear();
        }
        return false;
      }
      return true;
    });
    if(boss&&player.invincible===0&&rO(boss.x-boss.w/2,boss.y-boss.h/2,boss.w,boss.h,player.x-player.w/2,player.y-player.h/2,player.w,player.h))hitPlayer();
  }

  // powerups
  powerups=powerups.filter(p=>{
    p.y+=p.vy;p.timer++;
    if(p.y>H+20)return false;
    if(cR(p.x,p.y,13*SCALE,player.x-player.w/2,player.y-player.h/2,player.w,player.h)){applyPU(p.type);return false;}
    return true;
  });

  explosions=explosions.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vx*=0.93;p.vy*=0.93;p.life-=p.decay;p.r*=0.97;return p.life>0;
  });

  scoreDisp.textContent=score;
  updateKillsUI();
}

function applyPU(type){
  if(type==='life'){sfxWeaponGet();lives=Math.min(5,lives+1);updateHeartsUI();showPickup('❤️ 生命恢復！','#ff88aa');}
  else if(type==='power'){sfxWeaponGet();player.powerLevel=Math.min(4,player.powerLevel+1);player.weaponType='normal';player.weaponTimer=0;showPickup('🔥 火力升級！Lv.'+player.powerLevel,'#ffcc00');}
  else if(type==='rapid'){sfxWeaponGet();player.weaponType='rapid';player.weaponTimer=600;showPickup('⚡ 高速射擊！','#ffe000');}
  else if(type==='laser'){sfxWeaponGet();player.weaponType='laser';player.weaponTimer=600;showPickup('💎 雷射穿透！','#00eeff');}
  else if(type==='spread'){sfxWeaponGet();player.weaponType='spread';player.weaponTimer=600;showPickup('🌀 散彈攻擊！','#cc44ff');}
}
function hitPlayer(){
  if(player.invincible>0)return;
  lives--;sfxHit();player.invincible=120;spawnExp(player.x,player.y);updateHeartsUI();
  if(lives<=0)endGame();
}
function updateHeartsUI(){heartsDisp.textContent='❤️'.repeat(Math.max(0,lives))+'🖤'.repeat(Math.max(0,3-lives));}
function updateKillsUI(){
  if(!levelCfg)return;
  if(levelCfg.isBoss) killsDispEl.textContent=bossActive&&boss?`👾 BOSS ${Math.ceil(boss.hp/boss.maxHp*100)}%`:'👾 大魔王';
  else killsDispEl.textContent=`${Math.min(kills,levelCfg.killsNeeded)}/${levelCfg.killsNeeded} 擊`;
}
function showPickup(m,c){pickupMsg=m;pickupColor=c;pickupT=90;}

// ── Level clear ────────────────────────────────────
function levelClear(){
  if(state!=='playing')return;
  state='levelclear';
  sfxLevelUp();
  enemies=[];eBullets=[];bossActive=false;boss=null;
  doSave(Math.min(100,level+1));
  if(level>=100){sfxVictory();showClearScreen(true);return;}
  showClearScreen(false);
}
function showClearScreen(victory){
  const nLv=level+1;
  levelClearOvr.style.display='flex';
  levelClearOvr.style.flexDirection='column';
  levelClearOvr.style.alignItems='center';
  levelClearOvr.style.justifyContent='center';
  if(victory){
    levelClearOvr.innerHTML=`<div style="font-size:52px;margin-bottom:8px">🏆</div>
      <h2 style="font-size:28px;text-shadow:0 0 20px #ff0;color:#ff4;margin-bottom:10px">恭喜全部通關！</h2>
      <p style="color:#adf;font-size:14px;margin-bottom:6px">完成全部 100 關！太厲害了！</p>
      <p style="font-size:22px;color:#ffee00;font-weight:900;margin-bottom:20px">最終分數：${score}</p>
      <button class="bigBtn" onclick="startGame(1)">再挑戰一次！</button>`;
    return;
  }
  const nc=getLevelConfig(nLv);
  const ib=nc.isBoss;
  levelClearOvr.innerHTML=`
    <div style="font-size:36px;margin-bottom:4px">${ib?'⚠️':'✨'}</div>
    <h2 style="font-size:24px;color:#0ff;text-shadow:0 0 16px #0af;margin-bottom:6px">第 ${level} 關通過！</h2>
    <p style="color:#ffee00;font-size:13px;font-weight:700;margin-bottom:3px">
      ${ib?'⚠️ 下一關是大魔王！':'前往下一關'}
    </p>
    <p style="color:#adf;font-size:12px;margin-bottom:4px">第 ${nLv} 關・${nc.zone.name}</p>
    ${ib?`<p style="color:#ff8;font-size:20px;margin-bottom:4px">${nc.zone.boss} BOSS 來了！</p>`:''}
    <p style="color:#8df;font-size:18px;font-weight:900;margin-bottom:16px">分數：${score}</p>
    <button class="bigBtn" onclick="goNext()">繼續第 ${nLv} 關 ▶</button>
  `;
}
function goNext(){level++;levelClearOvr.style.display='none';startLevel();}

// ── Draw ───────────────────────────────────────────
function draw(){
  const z=levelCfg.zone;
  ctx.fillStyle=z.bg;ctx.fillRect(0,0,W,H);
  const gr=ctx.createRadialGradient(W*0.35,H*0.4,0,W*0.35,H*0.4,W*0.55);
  gr.addColorStop(0,z.nebula);gr.addColorStop(1,'transparent');
  ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);

  stars.forEach(s=>{
    ctx.save();ctx.globalAlpha=s.b;ctx.fillStyle=z.star;ctx.shadowColor=z.star;ctx.shadowBlur=2;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();ctx.restore();
  });

  powerups.forEach(drawPU);

  eBullets.forEach(b=>{
    ctx.save();ctx.shadowColor=b.isBoss?'#ff4400':'#ff6600';ctx.shadowBlur=10;
    ctx.fillStyle=b.isBoss?'#ff4400':'#ff6600';
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();ctx.restore();
  });

  bullets.forEach(b=>{
    ctx.save();
    if(b.laser){ctx.shadowColor='#00ffff';ctx.shadowBlur=18;ctx.fillStyle='#00ffff';ctx.fillRect(b.x-2.5*SCALE,b.y-13*SCALE,5*SCALE,24*SCALE);ctx.fillStyle='rgba(180,255,255,0.4)';ctx.fillRect(b.x-1*SCALE,b.y-17*SCALE,2*SCALE,32*SCALE);}
    else if(b.spread){ctx.shadowColor='#dd44ff';ctx.shadowBlur=10;ctx.fillStyle='#ee88ff';ctx.beginPath();ctx.ellipse(b.x,b.y,3.5*SCALE,7*SCALE,Math.atan2(b.vy,b.vx)+Math.PI/2,0,Math.PI*2);ctx.fill();}
    else if(b.rapid){ctx.shadowColor='#ffff00';ctx.shadowBlur=10;ctx.fillStyle='#ffff88';ctx.fillRect(b.x-2*SCALE,b.y-9*SCALE,4*SCALE,15*SCALE);}
    else{ctx.shadowColor='#ff9900';ctx.shadowBlur=12;ctx.fillStyle='#ffee00';ctx.beginPath();ctx.ellipse(b.x,b.y,3*SCALE,7*SCALE,0,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  });

  enemies.forEach(drawEnemy);
  if(bossActive&&boss)drawBoss(boss);

  if(player.invincible===0||Math.floor(frame/5)%2===0)drawShip(player.x,player.y,player.w,player.h);

  // engine flame
  if(frame%3<2){
    ctx.save();ctx.shadowColor='#ff8800';ctx.shadowBlur=8;
    const fh=(6+Math.random()*6)*SCALE;
    const gf=ctx.createLinearGradient(0,player.y+player.h/4,0,player.y+player.h/2+fh);
    gf.addColorStop(0,'#ffee00');gf.addColorStop(1,'rgba(255,80,0,0)');
    ctx.fillStyle=gf;ctx.beginPath();
    ctx.moveTo(player.x-player.w/5,player.y+player.h/4);ctx.lineTo(player.x,player.y+player.h/2+fh);ctx.lineTo(player.x+player.w/5,player.y+player.h/4);
    ctx.closePath();ctx.fill();ctx.restore();
  }

  explosions.forEach(p=>{
    ctx.save();ctx.globalAlpha=p.life;ctx.shadowColor=p.color;ctx.shadowBlur=6;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();
  });

  // boss warning
  if(bossActive&&boss&&boss.y<H*0.2&&Math.floor(frame/18)%2===0){
    ctx.save();ctx.fillStyle='#ff2200';ctx.font=`bold ${16*SCALE}px sans-serif`;
    ctx.textAlign='center';ctx.shadowColor='#ff0000';ctx.shadowBlur=12;
    ctx.fillText(`⚠️ 大魔王 ${z.boss} 來了！`,W/2,H*0.44);ctx.restore();
  }

  if(bossMsgT>0){bossMsgT--;ctx.save();ctx.globalAlpha=Math.min(1,bossMsgT/20);ctx.fillStyle='#ffee00';ctx.font=`bold ${22*SCALE}px sans-serif`;ctx.textAlign='center';ctx.shadowColor='#ff8800';ctx.shadowBlur=16;ctx.fillText(bossMsg,W/2,H*0.5);ctx.restore();}
  if(pickupT>0){
    pickupT--;
    ctx.save();const al=Math.min(1,pickupT/15);const rise=(90-pickupT)*0.5*SCALE;
    ctx.globalAlpha=al;ctx.shadowColor=pickupColor;ctx.shadowBlur=16;ctx.fillStyle=pickupColor;
    ctx.font=`bold ${18*SCALE}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(pickupMsg,W/2,H*0.63-rise);ctx.restore();
  }

  // kill progress bar
  if(!levelCfg.isBoss&&kills<levelCfg.killsNeeded){
    const pct=kills/levelCfg.killsNeeded;
    const bW=W*0.5,bX=W*0.25,bY=H-42*SCALE;
    ctx.save();ctx.fillStyle='rgba(0,0,0,0.4)';ctx.beginPath();ctx.roundRect(bX,bY,bW,6*SCALE,3*SCALE);ctx.fill();
    ctx.fillStyle=`hsl(${pct*120},100%,55%)`;ctx.shadowColor=`hsl(${pct*120},100%,55%)`;ctx.shadowBlur=6;
    ctx.beginPath();ctx.roundRect(bX,bY,bW*pct,6*SCALE,3*SCALE);ctx.fill();ctx.restore();
  }

  // weapon HUD
  const hudY=H-28*SCALE;
  ctx.save();ctx.fillStyle='rgba(0,0,20,0.6)';ctx.beginPath();ctx.roundRect(6*SCALE,hudY-6*SCALE,W-12*SCALE,26*SCALE,8*SCALE);ctx.fill();
  ctx.font=`bold ${10*SCALE}px sans-serif`;ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillStyle='#aaa';ctx.fillText('火力',12*SCALE,hudY+7*SCALE);
  for(let i=0;i<4;i++){ctx.fillStyle=i<player.powerLevel?'#ff8800':'rgba(255,255,255,0.15)';ctx.beginPath();ctx.arc((34+i*13)*SCALE,hudY+7*SCALE,5*SCALE,0,Math.PI*2);ctx.fill();}
  if(player.weaponType!=='normal'&&player.weaponTimer>0){
    const d=PDEFS[player.weaponType];const pct=player.weaponTimer/600;
    const bW=W-110*SCALE,bX=90*SCALE;
    ctx.fillStyle='rgba(255,255,255,0.1)';ctx.beginPath();ctx.roundRect(bX,hudY+2*SCALE,bW,10*SCALE,4*SCALE);ctx.fill();
    ctx.fillStyle=d.glow;ctx.shadowColor=d.glow;ctx.shadowBlur=6;ctx.beginPath();ctx.roundRect(bX,hudY+2*SCALE,bW*pct,10*SCALE,4*SCALE);ctx.fill();
    ctx.shadowBlur=0;ctx.font=`bold ${10*SCALE}px sans-serif`;ctx.textAlign='center';ctx.fillStyle='#fff';
    ctx.fillText(d.emoji+' '+d.label,bX+bW/2,hudY+7*SCALE);
    if(pct<0.2&&Math.floor(frame/8)%2===0){ctx.strokeStyle=d.glow;ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(bX,hudY+2*SCALE,bW,10*SCALE,4*SCALE);ctx.stroke();}
  }
  ctx.restore();
}

// ── Loop ───────────────────────────────────────────
function loop(){
  if(state==='playing'&&!paused){update();draw();}
  requestAnimationFrame(loop);
}

// ── Game flow ──────────────────────────────────────
function startLevel(){
  bullets=[];enemies=[];eBullets=[];explosions=[];powerups=[];
  bossActive=false;boss=null;kills=0;spawnTimer=0;fireTimer=0;
  bossMsgT=0;pickupT=0;
  levelCfg=getLevelConfig(level);
  levelDispEl.textContent=`第 ${level} 關`;
  updateKillsUI();
  if(levelCfg.isBoss)bossActive=true;
  state='playing';
}
function startGame(fromLv){
  AC.resume();
  level=fromLv||getSaved()||1;
  score=0;lives=3;frame=0;
  initPlayer();initStars();updateHeartsUI();
  overlay.style.display='none';levelClearOvr.style.display='none';
  pauseBtn.style.display='block';
  homeBtn.style.display='block';
  pauseOvr.style.display='none';
  paused=false;pauseBtn.textContent='⏸ 暫停';
  startLevel();
}
function endGame(){
  state='idle';paused=false;
  pauseBtn.style.display='none';
  homeBtn.style.display='none';
  pauseOvr.style.display='none';levelClearOvr.style.display='none';
  sfxGameOver();
  overlay.style.display='flex';
  overlay.innerHTML=`
    <h1>💥 遊戲結束</h1>
    <p style="font-size:14px;color:#fa8;margin-bottom:4px">第 ${level} 關・${levelCfg.zone.name}</p>
    <p style="font-size:24px;margin:10px 0">分數：<b style="color:#ffee00">${score}</b></p>
    <p style="color:#adf;font-size:12px;margin-bottom:18px">進度已儲存，下次從第 ${level} 關繼續！</p>
    <button class="bigBtn" onclick="startGame()">繼續第 ${level} 關</button>
    <button class="bigBtn" style="background:linear-gradient(135deg,#f44,#900);margin-top:8px" onclick="startGame(1)">從第 1 關重來</button>
  `;
}

// ── Input ──────────────────────────────────────────
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
  if(e.key==='p'||e.key==='P'||e.key==='Escape')togglePause();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
pauseBtn.addEventListener('click',togglePause);
resumeBtn.addEventListener('click',togglePause);
homeBtn.addEventListener('click',()=>{if(!paused)togglePause();goHome();});
startBtn.addEventListener('click',()=>startGame());
const restartBtn=document.getElementById('restartBtn');
if(restartBtn)restartBtn.addEventListener('click',()=>startGame(1));

['Up','Down','Left','Right'].forEach(dir=>{
  const btn=document.getElementById('btn'+dir);
  if(!btn)return;
  const k='m'+dir[0].toLowerCase();
  btn.addEventListener('pointerdown',e=>{e.preventDefault();keys[k]=true;});
  btn.addEventListener('pointerup',()=>{keys[k]=false;});
  btn.addEventListener('pointerleave',()=>{keys[k]=false;});
});
const fireBtn=document.getElementById('fireBtn');
fireBtn.addEventListener('pointerdown',e=>{e.preventDefault();autoFire=true;AC.resume();});
fireBtn.addEventListener('pointerup',()=>{autoFire=false;});

let touchId=null;
canvas.addEventListener('touchstart',e=>{
  AC.resume();if(state!=='playing')return;e.preventDefault();
  const t=e.changedTouches[0];touchId=t.identifier;
  const r=canvas.getBoundingClientRect();
  player.x=t.clientX-r.left;player.y=t.clientY-r.top;autoFire=true;
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(let t of e.changedTouches){
    if(t.identifier===touchId){
      const r=canvas.getBoundingClientRect();
      player.x=Math.max(player.w/2,Math.min(W-player.w/2,t.clientX-r.left));
      player.y=Math.max(player.h/2,Math.min(H-player.h/2,t.clientY-r.top));
    }
  }
},{passive:false});
canvas.addEventListener('touchend',()=>{autoFire=false;});

loop();
</script>
</body>
</html>
